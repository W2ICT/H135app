function LoginPage({ onLogin, isDark, toggleDark }) {
  const [pw, setPw]         = useState('');
  const [show, setShow]     = useState(false);
  const [err, setErr]       = useState(false);
  const [shaking, setShake] = useState(false);

  const submit = e => {
    e.preventDefault();
    if (pw === 'H135.SCL') {
      sessionStorage.setItem('h135_auth', '1');
      onLogin();
    } else {
      setErr(true);
      setShake(true);
      setTimeout(() => setShake(false), 400);
    }
  };

  return (
    <div className="min-h-screen bg-slate-100 dark:bg-gray-950 flex items-center justify-center px-4 transition-colors">
      {/* Theme toggle */}
      <button onClick={toggleDark}
        className="fixed top-4 right-4 p-2.5 rounded-xl bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-slate-50 dark:hover:bg-gray-700 transition-colors shadow-sm">
        {isDark ? <IconSun /> : <IconMoon />}
      </button>

      <div className={`w-full max-w-sm ${shaking ? 'shake' : ''}`}>
        {/* Logo */}
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
            <IconDoc />
          </div>
          <h1 className="text-2xl font-bold text-gray-900 dark:text-white leading-tight">H135 Document Reference</h1>
          <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">ระบบฐานข้อมูลเอกสารอ้างอิงองค์กร</p>
        </div>

        {/* Card */}
        <div className="bg-white dark:bg-gray-900 rounded-2xl shadow-lg border border-slate-200 dark:border-gray-800 p-6">
          <h2 className="text-base font-semibold text-gray-800 dark:text-gray-100 mb-5">เข้าสู่ระบบ</h2>
          <form onSubmit={submit} className="space-y-4">

function Hl({ text, q }) {
  if (!q || !text) return <>{text}</>;
  const s = String(text), idx = s.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return <>{s}</>;
  return <>{s.slice(0,idx)}<mark className="bg-yellow-300/60 dark:bg-yellow-400/25 text-yellow-800 dark:text-yellow-200 rounded px-0.5">{s.slice(idx,idx+q.length)}</mark>{s.slice(idx+q.length)}</>;
}

function DocCard({ page, doc, search }) {
  const link    = doc[page.linkKey];
  const mainCol = page.columns.find(c => c.type === 'main');
  const numCol  = page.columns.find(c => c.type === 'num');
  const badgeCol= page.columns.find(c => c.type === 'badge');
  const metaCols= page.columns.filter(c => c.type !== 'main' && c.type !== 'num' && c.type !== 'badge');

  return (
    <div className="bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl p-4 space-y-3

      {link

// ─────────────────────────────────────────────────────────────
function PageContent({ page, state, upd, onLoad, viewMode, setViewMode }) {
  const { data, loading, error, search, filter, filter2, sortField, sortDir, lastUpdated } = state;

  const categories = useMemo(() => {
    if (!data) return [];
    const seen = new Set();
    data.forEach(d => { const c = String(d[page.filterKey]||''); if (c) seen.add(c); });
    return Array.from(seen);
  }, [data, page.filterKey]);

  const categories2 = useMemo(() => {
    if (!data || !page.secondaryFilterKey) return [];
    const seen = new Set();
    data.forEach(d => { const c = String(d[page.secondaryFilterKey]||''); if (c) seen.add(c); });
    return Array.from(seen).sort();
  }, [data, page.secondaryFilterKey]);

  const filtered = useMemo(() => {
    if (!data) return [];
    let r = data;
    if (filter !== 'all') r = r.filter(d => String(d[page.filterKey]||'') === filter);
    if (filter2 && filter2 !== 'all' && page.secondaryFilterKey)
      r = r.filter(d => String(d[page.secondaryFilterKey]||'') === filter2);
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(d =>
        String(d['ชื่อหนังสือ']||'').toLowerCase().includes(q) ||
        String(d[page.filterKey]||'').toLowerCase().includes(q) ||
        String(d['Year']||'').includes(q) ||
        (page.secondaryFilterKey && String(d[page.secondaryFilterKey]||'').toLowerCase().includes(q))
      );
    }
    return [...r].sort((a, b) => {
      let av = sortField==='ลำดับ' ? (Number(a[sortField])||0) : String(a[sortField]||'').toLowerCase();
      let bv = sortField==='ลำดับ' ? (Number(b[sortField])||0) : String(b[sortField]||'').toLowerCase();
      if (av < bv) return sortDir==='asc' ? -1 : 1;
      if (av > bv) return sortDir==='asc' ?  1 : -1;
      return 0;
    });
  }, [data, filter, filter2, search, sortField, sortDir]);

  const handleSort = field => {
    if (sortField===field) upd({ sortDir: sortDir==='asc' ? 'desc' : 'asc' });
    else upd({ sortField: field, sortDir: 'asc' });
  };

  const SortTh = ({ field, label, align='left' }) => (
    <th className={`py-3 px-3 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide cursor-pointer select-none text-${align}`}
        onClick={() => handleSort(field)}>
      {label}{' '}
      <span className={sortField===field ? 'text-blue-500' : 'text-gray-300 dark:text-gray-700'}>
        {sortField===field ? (sortDir==='asc' ? '↑' : '↓') : '↕'}
      </span>
    </th>
  );

  if (loading) return <Spinner color={page.accent.dot.replace('bg-','').split('-')[0]} />;

  if (error) return (
    <div className="flex flex-col items-center py-20 gap-4 text-center">
      <div className="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-500 dark:text-red-400 text-xl font-bold">!</div>
      <p className="text-red-500 dark:text-red-400">{error}</p>
      <button onClick={onLoad} className="px-4 py-2 bg-slate-100 dark:bg-gray-800 rounded-lg text-sm hover:bg-slate-200 dark:hover:bg-gray-700 transition-colors">ลองใหม่</button>
    </div>
  );

  if (!data) return null;

  const total    = data.length;
  const shown    = filtered.length;
  const catCount = cat => data.filter(d => String(d[page.filterKey]||'')===cat).length;

  return (
    <div className="space-y-4 fade-up">
      {/* Stats strip */}
      <div className="flex flex-wrap gap-2 sm:gap-3">
        <div className="bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl px-3 sm:px-4 py-3 flex items-center gap-3 shadow-sm">
          <div className={`p-1.5 sm:p-2 rounded-lg ${page.accent.statCard}`}>
            <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div>
            <p className="text-gray-400 dark:text-gray-500 text-xs uppercase tracking-wider">เอกสารทั้งหมด</p>
            <p className="text-2xl font-bold tabular-nums text-gray-900 dark:text-white">{total}</p>
          </div>
        </div>
        {categories.map(cat => (
          <div key={cat} className="bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl px-3 sm:px-4 py-3 flex items-center gap-2 shadow-sm">
            <span className={`inline-flex items-center gap-1.5 px-2 sm:px-2.5 py-1 rounded-md text-xs font-medium ${getCatStyle(page, cat)}`}>
              <span className="w-1.5 h-1.5 rounded-full bg-current opacity-70 hidden sm:block" />
              <span className="hidden sm:inline">{cat}</span>
              <span className="sm:hidden">{cat.split(' ')[0]}</span>
            </span>
            <span className="text-xl font-bold text-gray-700 dark:text-gray-200 tabular-nums">{catCount(cat)}</span>
          </div>
        ))}
      </div>

      {/* Search + Filters */}
      <div className="bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl p-4 space-y-3 shadow-sm">
        <div className="relative">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500 pointer-events-none"
               fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" placeholder="ค้นหาชื่อเอกสาร, ประเภท, ปี…"
            value={search} onChange={e => upd({ search: e.target.value })}
            className="w-full bg-slate-50 dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-lg pl-10 pr-9 py-2.5 text-sm
                       text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-600
                       focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition" />
          {search && <button onClick={() => upd({ search:'' })}
            className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg leading-none">×</button>}
        </div>

        {/* Primary filter */}
        <div className="flex flex-wrap gap-1.5">
          <button onClick={() => upd({ filter:'all' })}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
              ${filter==='all' ? 'bg-gray-700 text-white dark:bg-gray-600' : 'bg-slate-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-slate-200 dark:hover:bg-gray-700 border border-slate-200 dark:border-gray-700'}`}>
            ทั้งหมด <span className="px-1.5 py-0.5 rounded text-xs tabular-nums bg-black/10 dark:bg-gray-700/80">{total}</span>
          </button>
          {categories.map(cat => (
            <button key={cat} onClick={() => upd({ filter:cat })}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
                ${filter===cat ? `${getCatStyle(page,cat)} !ring-0` : 'bg-slate-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-slate-200 dark:hover:bg-gray-700 border border-slate-200 dark:border-gray-700'}`}>
              {cat} <span className="px-1.5 py-0.5 rounded bg-black/10 dark:bg-black/20 tabular-nums">{catCount(cat)}</span>
            </button>
          ))}
        </div>

        {/* Secondary filter */}
        {page.secondaryFilterKey && categories2.length > 0 && (
          <div className="flex flex-wrap gap-1.5 pt-1 border-t border-slate-100 dark:border-gray-800">
            <span className="text-gray-400 dark:text-gray-600 text-xs self-center mr-1">{page.secondaryFilterKey}:</span>
            <button onClick={() => upd({ filter2:'all' })}
              className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors
                ${(!filter2||filter2==='all') ? 'bg-gray-700 text-white dark:bg-gray-600' : 'bg-slate-100 dark:bg-gray-800 text-gray-500 dark:text-gray-500 hover:bg-slate-200 dark:hover:bg-gray-700 border border-slate-200 dark:border-gray-700'}`}>
              ทั้งหมด
            </button>
            {categories2.map(src => (
              <button key={src} onClick={() => upd({ filter2:src })}
                className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors
                  ${filter2===src ? 'bg-gray-700 text-white dark:bg-gray-600' : 'bg-slate-100 dark:bg-gray-800 text-gray-500 dark:text-gray-500 hover:bg-slate-200 dark:hover:bg-gray-700 border border-slate-200 dark:border-gray-700'}`}>
                {src}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Results count + view toggle */}
      <div className="flex items-center justify-between text-sm text-gray-400 dark:text-gray-500 px-0.5">
        <span>แสดง <span className="text-gray-700 dark:text-gray-300 font-medium tabular-nums">{shown}</span> รายการ
          {search && <> สำหรับ "<span className="text-blue-500 dark:text-blue-400">{search}</span>"</>}
        </span>
        <div className="flex items-center gap-2">
          {lastUpdated && <span className="text-gray-300 dark:text-gray-700 text-xs hidden sm:inline">อัปเดต {lastUpdated}</span>}
          {/* View mode toggle */}
          <div className="flex rounded-lg border border-slate-200 dark:border-gray-700 overflow-hidden">
            <button onClick={() => setViewMode('table')}
              className={`p-1.5 transition-colors ${viewMode==='table' ? 'bg-slate-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300' : 'bg-white dark:bg-gray-900 text-gray-400 dark:text-gray-600 hover:bg-slate-100 dark:hover:bg-gray-800'}`}
              title="Table view">
              <IconTable />
            </button>
            <button onClick={() => setViewMode('card')}
              className={`p-1.5 transition-colors ${viewMode==='card' ? 'bg-slate-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300' : 'bg-white dark:bg-gray-900 text-gray-400 dark:text-gray-600 hover:bg-slate-100 dark:hover:bg-gray-800'}`}
              title="Card view">
              <IconGrid />
            </button>
          </div>
        </div>
      </div>

      {/* Card view */}
      {viewMode === 'card' && (
        shown === 0
          ? <div className="py-16 text-center text-gray-300 dark:text-gray-700">
              <svg className="w-10 h-10 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" strokeWidth={1.5} viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              ไม่พบเอกสารที่ตรงกับการค้นหา
            </div>
          : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
              {filtered.map((doc, i) => <DocCard key={doc._idx??i} page={page} doc={doc} search={search} />)}
            </div>
      )}

      {/* Table view */}
      {viewMode === 'table' && (
        <div className="bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-800 rounded-xl overflow-hidden shadow-sm">
          <div className="overflow-x-auto scrollbar-thin">
            <table className="w-full" style={{minWidth: page.columns.length > 5 ? '800px' : '600px'}}>
              <thead>
                <tr className="border-b border-slate-100 dark:border-gray-800 bg-slate-50 dark:bg-gray-900/80">
                  {page.columns.map(col => (
                    <SortTh key={col.key} field={col.key} label={col.label}
                      align={col.type==='right' ? 'right' : col.type==='center' ? 'center' : 'left'} />
                  ))}
                  <th className="py-3 px-3 text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide text-center">เปิดเอกสาร</th>
                </tr>
              </thead>
              <tbody>
                {shown === 0
                  ? <tr><td colSpan={page.columns.length+1} className="py-16 text-center text-gray-300 dark:text-gray-700">
                      <svg className="w-10 h-10 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" strokeWidth={1.5} viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                      </svg>
                      ไม่พบเอกสารที่ตรงกับการค้นหา
                    </td></tr>
                  : filtered.map((doc, i) => <DocRow key={doc._idx??i} page={page} doc={doc} search={search} />)
                }
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  MAIN APP
// ─────────────────────────────────────────────────────────────
const INIT_STATE = { data:null, loading:false, error:null, search:'', filter:'all', filter2:'all', sortField:'ลำดับ', sortDir:'asc', lastUpdated:null };

function App() {
  const [isAuth,    setIsAuth]    = useState(() => !!sessionStorage.getItem('h135_auth'));
  const [isDark,    setIsDark]    = useState(() => localStorage.getItem('h135_theme') !== 'light');
  const [viewMode,  setViewMode]  = useState(() => typeof window !== 'undefined' && window.innerWidth < 768 ? 'card' : 'table');
  const [activePage,setActivePage]= useState('flm');
  const [states,    setStates]    = useState({
    flm:{...INIT_STATE}, regt:{...INIT_STATE}, formrk:{...INIT_STATE}, handbook:{...INIT_STATE},
  });

  // Auto-switch to card view on small screen
  useEffect(() => {
    const onResize = () => { if (window.innerWidth < 768) setViewMode('card'); };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const toggleDark = () => {
    const next = !isDark;
    setIsDark(next);
    if (next) { document.documentElement.classList.add('dark'); localStorage.setItem('h135_theme','dark'); }
    else      { document.documentElement.classList.remove('dark'); localStorage.setItem('h135_theme','light'); }
  };

  const logout = () => { sessionStorage.removeItem('h135_auth'); setIsAuth(false); };

  const upd = useCallback((pid, patch) => {
    setStates(s => ({ ...s, [pid]: { ...s[pid], ...patch } }));
  }, []);

  const loadPage = useCallback(pid => {
    const page = PAGES.find(p => p.id === pid);
    upd(pid, { loading:true, error:null });
    if (!IS_GAS) {
      setTimeout(() => {
        const raw = applyTypeMap(MOCK[page.sheet] || [], page);
        upd(pid, { data:raw, loading:false, lastUpdated:stamp() });
      }, 400);
      return;
    }
    google.script.run
      .withSuccessHandler(raw => { upd(pid, { data:applyTypeMap(raw,page), loading:false, lastUpdated:stamp() }); })
      .withFailureHandler(err => { upd(pid, { error:err.message||'เกิดข้อผิดพลาดในการโหลดข้อมูล', loading:false }); })
      .getSheetData(page.sheet);
  }, [upd]);

  useEffect(() => { if (isAuth) loadPage('flm'); }, [isAuth]);

  useEffect(() => {
    if (!isAuth) return;
    const s = states[activePage];
    if (!s.data && !s.loading && !s.error) loadPage(activePage);
  }, [activePage, isAuth]);

  if (!isAuth) return <LoginPage onLogin={() => setIsAuth(true)} isDark={isDark} toggleDark={toggleDark} />;

  const page  = PAGES.find(p => p.id === activePage);
  const state = states[activePage];

  return (
    <div className="min-h-screen bg-slate-100 dark:bg-gray-950 pb-12 transition-colors">

      {/* ── Header ── */}
      <header className="sticky top-0 z-20 bg-white/90 dark:bg-gray-950/90 backdrop-blur-md border-b border-slate-200 dark:border-gray-800/60 shadow-sm dark:shadow-none">
        <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 flex items-center justify-between gap-2 sm:gap-3">
          {/* Logo */}
          <div className="flex items-center gap-2 sm:gap-3 min-w-0">
            <div className="p-1.5 sm:p-2 bg-blue-600 rounded-lg shrink-0">
              <IconDoc />
            </div>
            <div className="min-w-0">
              <h1 className="text-xs sm:text-sm font-bold leading-tight text-gray-900 dark:text-white truncate">H135 Document Reference</h1>
              <p className="text-blue-600 dark:text-blue-400 text-xs leading-none hidden sm:block">ระบบฐานข้อมูลเอกสารอ้างอิงองค์กร</p>
            </div>
          </div>

          {/* Right actions */}
          <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
            {/* Refresh */}
            <button onClick={() => loadPage(activePage)} disabled={state.loading}
              className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-2 rounded-lg border border-slate-200 dark:border-gray-800
                         bg-white dark:bg-gray-900 hover:bg-slate-50 dark:hover:bg-gray-800
                         text-gray-500 dark:text-gray-400 text-xs transition-colors disabled:opacity-40">
              <svg className={`w-3.5 h-3.5 ${state.loading ? 'spin' : ''}`} fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
                <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              <span className="hidden sm:inline">{state.loading ? 'โหลด…' : 'รีเฟรช'}</span>
            </button>

            {/* Dark/Light toggle */}
            <button onClick={toggleDark}
              className="p-2 rounded-lg border border-slate-200 dark:border-gray-800 bg-white dark:bg-gray-900 hover:bg-slate-50 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors">
              {isDark ? <IconSun /> : <IconMoon />}
            </button>

            {/* Logout */}
            <button onClick={logout}
              className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-2 rounded-lg border border-slate-200 dark:border-gray-800
                         bg-white dark:bg-gray-900 hover:bg-red-50 dark:hover:bg-red-900/20
                         text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400
                         text-xs transition-colors">
              <IconLogout />
              <span className="hidden sm:inline">ออกจากระบบ</span>
            </button>
          </div>
        </div>

        {/* ── Tab navigation ── */}
        <nav className="max-w-7xl mx-auto px-3 sm:px-6 flex gap-0 overflow-x-auto scrollbar-thin border-t border-slate-100 dark:border-gray-800/40">
          {PAGES.map(p => {
            const isActive = p.id === activePage;
            const cnt = states[p.id].data?.length;
            return (
              <button key={p.id} onClick={() => setActivePage(p.id)}
                className={`flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-3 text-xs sm:text-sm font-medium whitespace-nowrap border-b-2 transition-colors
                  ${isActive ? p.accent.tab : 'border-transparent text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 hover:border-slate-300 dark:hover:border-gray-700'}`}>
                <span className="sm:hidden">{p.shortLabel}</span>
                <span className="hidden sm:inline">{p.label}</span>
                {cnt != null && (
                  <span className={`px-1.5 py-0.5 rounded text-xs tabular-nums
                    ${isActive ? 'bg-slate-200 dark:bg-gray-800 text-gray-600 dark:text-gray-300' : 'bg-slate-100 dark:bg-gray-800 text-gray-400 dark:text-gray-600'}`}>
                    {cnt}
                  </span>
                )}
              </button>
            );
          })}
        </nav>
      </header>

      {/* ── Page Content ── */}
      <main className="max-w-7xl mx-auto px-3 sm:px-6 mt-4 sm:mt-5">
        <PageContent
          key={activePage}
          page={page}
          state={state}
          upd={patch => upd(activePage, patch)}
          onLoad={() => loadPage(activePage)}
          viewMode={viewMode}
          setViewMode={setViewMode}
        />
      </main>

      <p className="text-center text-gray-300 dark:text-gray-800 text-xs mt-8">
        H135 Document Reference System • Real-time จาก Google Sheets
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

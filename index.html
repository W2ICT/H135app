  <!-- Apply theme before render — prevents flash -->
  <script>
    (function(){
      if (localStorage.getItem('h135_theme') === 'light')
        document.documentElement.classList.remove('dark');
      else
        document.documentElement.classList.add('dark');
    })();
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>
    /* ── Theme tokens ─────────────────────────────── */
    :root {
      --bg:    #f0f4f8;
      --surf:  #ffffff;
      --surf2: #f5f8fb;
      --bdr:   #dce3ed;
      --bdr2:  #c8d2df;
      --t1:    #18202e;
      --t2:    #3c4a5e;
      --t3:    #7a8999;
      --t4:    #b0bcc8;
      --inp:   #f5f8fb;
      --hdr:   rgba(255,255,255,0.92);
      --shadow: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    }
    html.dark {
      --bg:    #0d1117;
      --surf:  #161c25;
      --surf2: #1c2333;
      --bdr:   #243040;
      --bdr2:  #2e3d50;
      --t1:    #dce8f4;
      --t2:    #8ba0b8;
      --t3:    #445060;
      --t4:    #28333f;
      --inp:   #0d1117;
      --hdr:   rgba(13,17,23,0.92);
      --shadow: none;
    }

    /* ── App utility classes ──────────────────────── */
    body      { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; transition:background .2s,color .2s; }
    .a-surf   { background:var(--surf); }
    .a-surf2  { background:var(--surf2); }
    .a-bdr    { border-color:var(--bdr); }
    .a-bdr2   { border-color:var(--bdr2); }
    .a-t1     { color:var(--t1); }
    .a-t2     { color:var(--t2); }
    .a-t3     { color:var(--t3); }
    .a-t4     { color:var(--t4); }
    .a-inp    { background:var(--inp); color:var(--t1); border-color:var(--bdr); }
    .a-inp::placeholder { color:var(--t4); }
    .a-hdr    { background:var(--hdr); border-color:var(--bdr); }
    .a-card   { background:var(--surf); border:1px solid var(--bdr); box-shadow:var(--shadow); }
    .a-hov:hover { background:var(--surf2); }
    .a-sep    { border-color:var(--bdr); }
    .a-row    { border-bottom:1px solid var(--bdr); }
    .a-row:hover { background:var(--surf2); }

    /* ── Badge colors (light & dark aware) ────────── */
    .bd-blue   { background:rgba(59,130,246,.1);  color:#3b82f6; border:1px solid rgba(59,130,246,.22); }
    .bd-emerald{ background:rgba(16,185,129,.1);  color:#059669; border:1px solid rgba(16,185,129,.22); }
    .bd-amber  { background:rgba(245,158,11,.1);  color:#d97706; border:1px solid rgba(245,158,11,.22); }
    .bd-rose   { background:rgba(244,63,94,.1);   color:#e11d48; border:1px solid rgba(244,63,94,.22);  }
    .bd-purple { background:rgba(139,92,246,.1);  color:#7c3aed; border:1px solid rgba(139,92,246,.22); }
    .bd-pink   { background:rgba(236,72,153,.1);  color:#db2777; border:1px solid rgba(236,72,153,.22); }
    .bd-slate  { background:rgba(100,116,139,.1); color:#475569; border:1px solid rgba(100,116,139,.22);}
    html.dark .bd-blue   { background:rgba(59,130,246,.15);  color:#93c5fd; }
    html.dark .bd-emerald{ background:rgba(16,185,129,.15);  color:#6ee7b7; }
    html.dark .bd-amber  { background:rgba(245,158,11,.15);  color:#fcd34d; }
    html.dark .bd-rose   { background:rgba(244,63,94,.15);   color:#fda4af; }
    html.dark .bd-purple { background:rgba(139,92,246,.15);  color:#c4b5fd; }
    html.dark .bd-pink   { background:rgba(236,72,153,.15);  color:#f9a8d4; }
    html.dark .bd-slate  { background:rgba(100,116,139,.15); color:#94a3b8; }

    /* ── Button variants ──────────────────────────── */
    .btn-ghost {
      background:var(--surf); border:1px solid var(--bdr); color:var(--t2);
      transition:background .15s,color .15s;
    }
    .btn-ghost:hover { background:var(--surf2); }
    .btn-ghost:disabled { opacity:.4; }
    .btn-filter {
      background:var(--surf2); border:1px solid var(--bdr); color:var(--t2);
      transition:background .15s;
    }
    .btn-filter:hover { background:var(--bdr); }
    .btn-filter.active { background:var(--t1); color:var(--surf); border-color:var(--t1); }

    /* ── Scrollbar ────────────────────────────────── */
    .thin-scroll::-webkit-scrollbar               { width:4px; height:4px; }
    .thin-scroll::-webkit-scrollbar-track         { background:var(--surf2); }
    .thin-scroll::-webkit-scrollbar-thumb         { background:var(--bdr2); border-radius:9px; }

    /* ── Animations ───────────────────────────────── */
    @keyframes spin    { to{transform:rotate(360deg);} }
    .spin              { animation:spin .8s linear infinite; }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .fade-up           { animation:fadeUp .22s ease both; }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .shake             { animation:shake .38s ease; }

    /* ── Highlight mark ───────────────────────────── */
    mark { background:rgba(251,191,36,.35); color:inherit; border-radius:3px; padding:0 2px; }
    html.dark mark { background:rgba(251,191,36,.25); }

    .a-focus:focus { outline:none; box-shadow:0 0 0 2px rgba(59,130,246,.4); border-color:#3b82f6; }

</head>

const IS_GAS = typeof google !== 'undefined' && google.script;

// Google Sheets ID — used by standalone HTML (GitHub Pages) via gviz/tq endpoint
// The spreadsheet must be shared "Anyone with the link can view"
const SHEET_ID = '1NGI8XOSVom1TxwM0pqlhc_qJugLAZjjqgISzSFpaUK0';

/**
 * Fetch a sheet's data directly from Google Sheets public gviz/tq API.
 * No GAS needed — works from any external site (GitHub Pages, etc.)
 * Returns rows as plain objects keyed by column header, same format as getSheetData().
 */
function fetchGSheet(sheetName) {
  const url =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
    `?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

  return fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(text => {
      // Strip Google's JSONP wrapper: /*O_o*/ google.visualization.Query.setResponse({...});
      const m = text.match(/setResponse\(([\s\S]*)\)\s*;?\s*$/);
      if (!m) throw new Error('รูปแบบ response ไม่ถูกต้อง');

      const { status, table, errors } = JSON.parse(m[1]);
      if (status !== 'ok') throw new Error(errors?.[0]?.detailed_message || errors?.[0]?.message || 'เกิดข้อผิดพลาดจาก Google Sheets');

      // Build header list from gviz cols (label = header row value)
      const headers = table.cols.map(c => (c.label || '').trim());

      return table.rows
        .map((row, idx) => {
          const obj = { _idx: idx };
          headers.forEach((h, i) => {
            if (!h) return;
            const cell = row.c ? row.c[i] : null;
            let val = (cell != null && cell.v != null) ? cell.v : '';
            // gviz returns dates as "Date(yyyy,m,d)" — convert to year number for Year column
            if (h === 'Year' && typeof val === 'string' && val.startsWith('Date(')) {
              const p = val.match(/Date\((\d+)/);
              val = p ? parseInt(p[1]) : val;
            }
            obj[h] = val;
          });
          return obj;
        })
        .filter(obj =>
          headers.some(h => h && obj[h] !== '' && obj[h] !== null && obj[h] !== undefined)
        );
    });
}

function applyTypeMap(rows, page) {
  if (!page.typeMap) return rows;
  return rows.map(r => ({ ...r, ประเภท: page.typeMap[Number(r.ประเภท)] || String(r.ประเภท) }));
}

function stamp() {
  return new Date().toLocaleString('th-TH', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

function getCatStyle(page, cat) {

          <p className="text-sm font-semibold a-t2 mb-4">เข้าสู่ระบบ</p>
          <form onSubmit={submit} className="space-y-3">

              <label className="block text-xs font-medium a-t3 mb-1.5">รหัสผ่าน</label>

function Hl({ text, q }) {
  if (!q || !text) return <>{text}</>;
  const s = String(text), lo = s.toLowerCase(), qi = lo.indexOf(q.toLowerCase());
  if (qi < 0) return <>{s}</>;
  return <>{s.slice(0,qi)}<mark>{s.slice(qi,qi+q.length)}</mark>{s.slice(qi+q.length)}</>;
}

function Badge({ page, cat }) {
  const cls = getCatStyle(page, cat);
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium whitespace-nowrap ${cls}`}>
      <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:'currentColor',opacity:.65}} />
      {cat}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────
//  DOC CARD  (card view)
// ─────────────────────────────────────────────────────────────
function DocCard({ page, doc, search }) {
  const link     = doc[page.linkKey];
  const mainCol  = page.columns.find(c => c.type === 'main');
  const numCol   = page.columns.find(c => c.type === 'num');
  const badgeCol = page.columns.find(c => c.type === 'badge');
  const metaCols = page.columns.filter(c => !['main','num','badge'].includes(c.type));

  return (
    <div className="a-card rounded-xl p-4 flex flex-col gap-3 transition-colors a-hov">
      <div className="flex items-center gap-2 flex-wrap">
        {badgeCol && <Badge page={page} cat={String(doc[badgeCol.key]||'')} />}
        {numCol   && <span className="text-xs a-t4 tabular-nums">#{doc[numCol.key]}</span>}
      </div>

      {mainCol && (
        <p className="text-sm font-medium a-t1 leading-snug flex-1">
          <Hl text={String(doc[mainCol.key]||'')} q={search} />
        </p>
      )}

      {metaCols.length > 0 && (
        <div className="flex flex-wrap gap-x-3 gap-y-1">
          {metaCols.map(col => doc[col.key]
            ? <span key={col.key} className="text-xs a-t3">
                <span className="a-t4">{col.label}: </span>
                <Hl text={String(doc[col.key]||'')} q={search}/>
              </span>
            : null
          )}
        </div>
      )}

      {link
        ? <a href={link} target="_blank" rel="noopener noreferrer"
            className={`flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-medium text-white transition-opacity hover:opacity-90 ${page.accent.btn}`}>
            <IcoOpen /> เปิดเอกสาร
          </a>
        : <span className="block text-center text-xs a-t4 py-1">ไม่มีลิ้งค์</span>
      }
    </div>
  );
}

function DocRow({ page, doc, search }) {
  const link = doc[page.linkKey];
  return (
    <tr className="a-row transition-colors">
      {page.columns.map(col => {
        const v = doc[col.key];
        if (col.type==='num')    return <td key={col.key} className="py-3 px-3 text-xs a-t4 tabular-nums">{v}</td>;
        if (col.type==='badge')  return <td key={col.key} className="py-3 px-3"><Badge page={page} cat={String(v||'')} /></td>;
        if (col.type==='main')   return <td key={col.key} className="py-3 px-3 text-sm font-medium a-t1 leading-snug"><Hl text={String(v||'')} q={search}/></td>;
        if (col.type==='right')  return <td key={col.key} className="py-3 px-3 text-xs a-t3 text-right whitespace-nowrap tabular-nums">{v||'—'}</td>;
        if (col.type==='center') return <td key={col.key} className="py-3 px-3 text-sm a-t3 text-center tabular-nums">{v||'—'}</td>;
        return <td key={col.key} className="py-3 px-3 text-sm a-t3 whitespace-nowrap"><Hl text={String(v||'')} q={search}/></td>;
      })}
      <td className="py-3 px-3 text-center">
        {link
          ? <a href={link} target="_blank" rel="noopener noreferrer"
              className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-white whitespace-nowrap transition-opacity hover:opacity-90 ${page.accent.btn}`}>
              <IcoOpen /> เปิดเอกสาร
            </a>
          : <span className="text-xs a-t4">—</span>
        }
      </td>
    </tr>
  );
}

// ─────────────────────────────────────────────────────────────
function PageContent({ page, state, upd, onLoad, viewMode, setViewMode }) {
  const { data, loading, error, search, filter, filter2, sortField, sortDir, lastUpdated } = state;

  const categories = useMemo(() => {
    if (!data) return [];
    const seen = new Set();
    data.forEach(d => { const c = String(d[page.filterKey]||''); if (c) seen.add(c); });
    return [...seen];
  }, [data, page.filterKey]);

  const categories2 = useMemo(() => {
    if (!data || !page.secondaryFilterKey) return [];
    const seen = new Set();
    data.forEach(d => { const c = String(d[page.secondaryFilterKey]||''); if (c) seen.add(c); });
    return [...seen].sort();
  }, [data, page.secondaryFilterKey]);

  const filtered = useMemo(() => {
    if (!data) return [];
    let r = [...data];
    if (filter !== 'all') r = r.filter(d => String(d[page.filterKey]||'') === filter);
    if (filter2 && filter2 !== 'all' && page.secondaryFilterKey)
      r = r.filter(d => String(d[page.secondaryFilterKey]||'') === filter2);
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(d =>
        String(d['ชื่อหนังสือ']||'').toLowerCase().includes(q) ||
        String(d[page.filterKey]||'').toLowerCase().includes(q) ||
        String(d['Year']||'').includes(q) ||
        (page.secondaryFilterKey && String(d[page.secondaryFilterKey]||'').toLowerCase().includes(q))
      );
    }
    r.sort((a, b) => {
      const av = sortField==='ลำดับ' ? (Number(a[sortField])||0) : String(a[sortField]||'').toLowerCase();
      const bv = sortField==='ลำดับ' ? (Number(b[sortField])||0) : String(b[sortField]||'').toLowerCase();
      if (av < bv) return sortDir==='asc' ? -1 : 1;
      if (av > bv) return sortDir==='asc' ?  1 : -1;
      return 0;
    });
    return r;
  }, [data, filter, filter2, search, sortField, sortDir]);

  const handleSort = f => {
    if (sortField===f) upd({ sortDir: sortDir==='asc'?'desc':'asc' });
    else upd({ sortField:f, sortDir:'asc' });
  };

  const SortTh = ({ field, label, align='left' }) => (
    <th className={`py-3 px-3 text-xs font-medium a-t3 uppercase tracking-wide cursor-pointer select-none text-${align}`}
        onClick={() => handleSort(field)}>
      {label} <span style={{color: sortField===field ? page.accent.tab : 'var(--t4)'}}>
        {sortField===field ? (sortDir==='asc'?'↑':'↓') : '↕'}
      </span>
    </th>
  );

  if (loading) return <Spinner />;

  if (error) return (
    <div className="flex flex-col items-center py-20 gap-3 text-center">
      <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold"
        style={{background:'rgba(239,68,68,.12)',color:'#ef4444'}}>!</div>
      <p className="text-sm" style={{color:'#ef4444'}}>{error}</p>
      <button onClick={onLoad} className="btn-ghost px-4 py-2 rounded-lg text-sm">ลองใหม่</button>
    </div>
  );

  if (!data) return null;

  const total    = data.length;
  const shown    = filtered.length;
  const catCount = cat => data.filter(d => String(d[page.filterKey]||'')===cat).length;

  return (
    <div className="space-y-3 fade-up">

      {/* ── Stats ── */}
      <div className="flex flex-wrap gap-2">
        {/* Total */}
        <div className="a-card rounded-xl px-4 py-3 flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center"
            style={{background:page.accent.icon,color:page.accent.iconClr}}>
            <IcoDoc />
          </div>
          <div>
            <p className="text-xs a-t4 uppercase tracking-wider leading-none mb-0.5">ทั้งหมด</p>
            <p className="text-2xl font-semibold a-t1 tabular-nums leading-none">{total}</p>
          </div>
        </div>
        {/* Per category */}
        {categories.map(cat => (
          <div key={cat} className="a-card rounded-xl px-3 py-3 flex items-center gap-2.5">
            <Badge page={page} cat={cat} />
            <span className="text-xl font-semibold a-t1 tabular-nums">{catCount(cat)}</span>
          </div>
        ))}
      </div>

      {/* ── Search + Filter ── */}
      <div className="a-card rounded-xl p-4 space-y-3">
        {/* Search */}
        <div className="relative">
          <span className="a-t4 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style={{lineHeight:0}}>
            <IcoSearch />
          </span>
          <input type="text" value={search} onChange={e => upd({ search: e.target.value })}
            placeholder="ค้นหาชื่อเอกสาร, ประเภท, ปี…"
            className="a-inp a-focus w-full rounded-xl pl-9 pr-8 py-2.5 text-sm border transition-colors" />
          {search && (
            <button onClick={() => upd({ search:'' })}
              className="a-t3 absolute right-3 top-1/2 -translate-y-1/2 text-lg leading-none">×</button>
          )}
        </div>

        {/* Primary filter */}
        <div className="flex flex-wrap gap-1.5">
          <button onClick={() => upd({ filter:'all' })}
            className={`btn-filter px-3 py-1.5 rounded-lg text-xs font-medium ${filter==='all'?'active':''}`}>
            ทั้งหมด&nbsp;<span className="tabular-nums">{total}</span>
          </button>
          {categories.map(cat => (
            <button key={cat} onClick={() => upd({ filter:cat })}
              className={`btn-filter px-3 py-1.5 rounded-lg text-xs font-medium ${filter===cat?'active':''}`}>
              {cat}&nbsp;<span className="tabular-nums">{catCount(cat)}</span>
            </button>
          ))}
        </div>

        {/* Secondary filter (Handbook) */}
        {page.secondaryFilterKey && categories2.length > 0 && (
          <div className="flex flex-wrap gap-1.5 pt-2 border-t a-sep">
            <span className="text-xs a-t4 self-center">{page.secondaryFilterKey}:</span>
            <button onClick={() => upd({ filter2:'all' })}
              className={`btn-filter px-3 py-1 rounded-lg text-xs font-medium ${(!filter2||filter2==='all')?'active':''}`}>
              ทั้งหมด
            </button>
            {categories2.map(src => (
              <button key={src} onClick={() => upd({ filter2:src })}
                className={`btn-filter px-3 py-1 rounded-lg text-xs font-medium ${filter2===src?'active':''}`}>
                {src}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* ── Results bar ── */}
      <div className="flex items-center justify-between px-0.5">
        <p className="text-xs a-t3">
          แสดง <span className="a-t2 font-medium tabular-nums">{shown}</span> รายการ
          {search && <> · "<span style={{color:page.accent.tab}}>{search}</span>"</>}
        </p>
        <div className="flex items-center gap-2">
          {lastUpdated && <span className="text-xs a-t4 hidden sm:inline">{lastUpdated}</span>}
          {/* View toggle */}
          <div className="flex rounded-lg border a-bdr overflow-hidden">
            {[['table',<IcoTable/>],['card',<IcoGrid/>]].map(([m,icon])=>(
              <button key={m} onClick={() => setViewMode(m)} title={m}
                style={{
                  padding:'5px 7px', lineHeight:0, transition:'background .15s',
                  background: viewMode===m ? 'var(--bdr)' : 'var(--surf)',
                  color: viewMode===m ? 'var(--t1)' : 'var(--t4)',
                }}>
                {icon}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Empty state ── */}
      {shown === 0 && (
        <div className="a-card rounded-xl py-16 text-center a-t4">
          <IcoSearch />
          <p className="text-sm mt-3 a-t3">ไม่พบเอกสารที่ตรงกับการค้นหา</p>
        </div>
      )}

      {/* ── Card view ── */}
      {viewMode === 'card' && shown > 0 && (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtered.map((doc, i) => <DocCard key={doc._idx??i} page={page} doc={doc} search={search} />)}
        </div>
      )}

      {/* ── Table view ── */}
      {viewMode === 'table' && shown > 0 && (
        <div className="a-card rounded-xl overflow-hidden">
          <div className="overflow-x-auto thin-scroll">
            <table className="w-full" style={{minWidth: page.columns.length > 5 ? '780px' : '560px'}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--bdr)',background:'var(--surf2)'}}>
                  {page.columns.map(col => (
                    <SortTh key={col.key} field={col.key} label={col.label}
                      align={col.type==='right'?'right':col.type==='center'?'center':'left'} />
                  ))}
                  <th className="py-3 px-3 text-xs font-medium a-t3 uppercase tracking-wide text-center">เปิดเอกสาร</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((doc, i) => <DocRow key={doc._idx??i} page={page} doc={doc} search={search} />)}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  MAIN APP
// ─────────────────────────────────────────────────────────────
const INIT = { data:null, loading:false, error:null, search:'', filter:'all', filter2:'all', sortField:'ลำดับ', sortDir:'asc', lastUpdated:null };

function App() {
  const [isAuth,    setIsAuth]    = useState(() => !!sessionStorage.getItem('h135_auth'));
  const [isDark,    setIsDark]    = useState(() => localStorage.getItem('h135_theme') !== 'light');
  const [viewMode,  setViewMode]  = useState(() => typeof window !== 'undefined' && window.innerWidth < 768 ? 'card' : 'table');
  const [activePage,setActivePage]= useState('flm');
  const [states,    setStates]    = useState({ flm:{...INIT}, regt:{...INIT}, formrk:{...INIT}, handbook:{...INIT} });

  // Auto card on small screen
  useEffect(() => {
    const fn = () => { if (window.innerWidth < 768) setViewMode('card'); };
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);

  const toggleDark = () => {
    const next = !isDark;
    setIsDark(next);
    document.documentElement.classList.toggle('dark', next);
    localStorage.setItem('h135_theme', next ? 'dark' : 'light');
  };

  const logout = () => { sessionStorage.removeItem('h135_auth'); setIsAuth(false); };

  const upd = useCallback((pid, patch) =>
    setStates(s => ({ ...s, [pid]: { ...s[pid], ...patch } }))
  , []);

  const loadPage = useCallback(pid => {
    const page = PAGES.find(p => p.id === pid);
    upd(pid, { loading:true, error:null });

    if (IS_GAS) {
      // ── Running inside Google Apps Script ──────────────────
      google.script.run
        .withSuccessHandler(raw => upd(pid, { data:applyTypeMap(raw, page), loading:false, lastUpdated:stamp() }))
        .withFailureHandler(e  => upd(pid, { error:e.message || 'เกิดข้อผิดพลาด', loading:false }))
        .getSheetData(page.sheet);

    } else {
      // ── Running standalone (GitHub Pages) ──────────────────
      // Fetch directly from Google Sheets via gviz/tq — no CORS issues
      fetchGSheet(page.sheet)
        .then(raw => upd(pid, { data:applyTypeMap(raw, page), loading:false, lastUpdated:stamp() }))
        .catch(err => upd(pid, { error: 'โหลดข้อมูลไม่ได้: ' + (err.message || err), loading:false }));
    }
  }, [upd]);

  useEffect(() => { if (isAuth) loadPage('flm'); }, [isAuth]);
  useEffect(() => {
    if (!isAuth) return;
    const s = states[activePage];
    if (!s.data && !s.loading && !s.error) loadPage(activePage);
  }, [activePage, isAuth]);

  if (!isAuth) return <LoginPage onLogin={() => setIsAuth(true)} isDark={isDark} toggleDark={toggleDark} />;

  const page  = PAGES.find(p => p.id === activePage);
  const state = states[activePage];

  return (
    <div className="min-h-screen pb-12">

      {/* ── Header ── */}
      <header className="sticky top-0 z-20 backdrop-blur-md a-hdr border-b"
        style={{borderColor:'var(--bdr)'}}>
        <div className="max-w-7xl mx-auto px-3 sm:px-6 h-14 flex items-center justify-between gap-3">
          {/* Logo */}
          <div className="flex items-center gap-2.5 min-w-0">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
              style={{background:'#3b82f6'}}>
              <IcoDoc />
            </div>
            <div className="min-w-0 hidden sm:block">
              <p className="text-sm font-semibold a-t1 leading-none">H135 Document Reference</p>
              <p className="text-xs a-t4 leading-none mt-0.5">ระบบฐานข้อมูลเอกสารอ้างอิงองค์กร</p>
            </div>
            <p className="text-sm font-semibold a-t1 sm:hidden">H135 DocRef</p>
          </div>

          {/* Actions */}
          <div className="flex items-center gap-1.5">
            {/* Refresh */}
            <button onClick={() => loadPage(activePage)} disabled={state.loading}
              className="btn-ghost flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-xs">
              <IcoRefresh spin={state.loading} />
              <span className="hidden sm:inline">{state.loading ? 'โหลด…' : 'รีเฟรช'}</span>
            </button>
            {/* Theme */}
            <button onClick={toggleDark} className="btn-ghost p-2 rounded-lg" style={{lineHeight:0}}>
              {isDark ? <IcoSun /> : <IcoMoon />}
            </button>
            {/* Logout */}
            <button onClick={logout}
              className="btn-ghost flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-xs"
              style={{color:'var(--t2)'}}
              onMouseOver={e=>e.currentTarget.style.color='#ef4444'}
              onMouseOut={e=>e.currentTarget.style.color='var(--t2)'}>
              <IcoLogout />
              <span className="hidden sm:inline">ออกจากระบบ</span>
            </button>
          </div>
        </div>

        {/* ── Tabs ── */}
        <nav className="max-w-7xl mx-auto px-3 sm:px-6 flex overflow-x-auto thin-scroll"
          style={{borderTop:'1px solid var(--bdr)'}}>
          {PAGES.map(p => {
            const isActive = p.id === activePage;
            const cnt = states[p.id].data?.length;
            return (
              <button key={p.id} onClick={() => setActivePage(p.id)}
                className="flex items-center gap-1.5 px-3 sm:px-4 py-3 text-xs sm:text-sm font-medium whitespace-nowrap border-b-2 transition-colors"
                style={{
                  borderBottomColor: isActive ? page.accent.tab : 'transparent',
                  color: isActive ? p.accent.tab : 'var(--t3)',
                }}>
                <span className="sm:hidden">{p.shortLabel}</span>
                <span className="hidden sm:inline">{p.label}</span>
                {cnt != null && (
                  <span className="px-1.5 py-0.5 rounded text-xs tabular-nums"
                    style={{background:'var(--surf2)',color:'var(--t3)'}}>
                    {cnt}
                  </span>
                )}
              </button>
            );
          })}
        </nav>
      </header>

      {/* ── Content ── */}
      <main className="max-w-7xl mx-auto px-3 sm:px-6 mt-5">
        <PageContent
          key={activePage}
          page={page} state={state}
          upd={patch => upd(activePage, patch)}
          onLoad={() => loadPage(activePage)}
          viewMode={viewMode} setViewMode={setViewMode}
        />
      </main>

      <p className="text-center text-xs a-t4 mt-10">
        H135 Document Reference System · Real-time จาก Google Sheets
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H135 T3H, RTAF - Database</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; overflow: hidden; }
    .sidebar-active { background-color: rgba(30, 58, 138, 1); color: white; border-left: 4px solid #3b82f6; }
    
    /* Minimal & Compact Table Styles */
    .minimal-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .minimal-table th { text-align: left; padding: 10px 16px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #e2e8f0; background-color: #ffffff; }
    .minimal-table td { padding: 8px 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; transition: background-color 0.15s; }
    .minimal-table tr:last-child td { border-bottom: none; }
    .minimal-table tr:hover td { background-color: #f8fafc; }
    
    /* Category Row Styles - Single line and Ellipsis */
    .category-row { 
      background-color: #f8fafc; 
      font-weight: 700; 
      color: #334155; 
      font-size: 0.8rem; 
      border-left: 4px solid #cbd5e1; 
      cursor: pointer;
      user-select: none;
      white-space: nowrap; /* ทำให้เป็นบรรทัดเดียว */
    }
    .category-row:hover { background-color: #f1f5f9; }

    /* Sidebar Transitions & Visibility */
    #sidebar { 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 16rem; /* 64 in tailwind */
    }
    #main-area { 
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .sidebar-collapsed { transform: translateX(-100%) !important; }
    .main-expanded { margin-left: 0 !important; }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .chevron-icon { transition: transform 0.2s ease; color: #64748b; }
    .collapsed .chevron-icon { transform: rotate(-90deg); }

    /* Title Link style */
    .doc-link { text-decoration: none; display: block; width: 100%; }
    .doc-link:hover .doc-title { color: #2563eb; }

    /* Mobile Responsive Adjustments */
    @media (max-width: 640px) {
      .minimal-table th, .minimal-table td { padding: 8px 10px; }
      .minimal-table th:nth-child(3), .minimal-table td:nth-child(3) { display: none; } /* ซ่อนคอลัมน์ ปี บนมือถือเพื่อประหยัดพื้นที่ */
      .doc-title { font-size: 0.75rem; }
      .category-row { font-size: 0.75rem; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Login Overlay -->
  <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 bg-opacity-90 p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 w-full max-w-md text-center transform transition-all">
      <div class="w-16 h-16 sm:w-20 sm:h-20 bg-blue-700 rounded-full flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 sm:h-10 sm:w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-xl sm:text-2xl font-bold text-slate-800">H135 T3H, RTAF</h1>
      <p class="text-slate-500 text-xs sm:text-sm mt-1 mb-6 uppercase tracking-wide">ระบบสืบค้นข้อมูลทางเทคนิค</p>
      <input type="password" id="passwordInput" placeholder="ระบุรหัสผ่าน" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4 text-center">
      <button onclick="handleLogin()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition-all shadow-md active:scale-95">
        เข้าสู่ระบบ
      </button>
    </div>
  </div>

  <!-- App Wrapper -->
  <div id="app" class="hidden flex h-screen overflow-hidden">
    
    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 bg-slate-900 text-slate-300 transform -translate-x-full lg:translate-x-0 border-r border-slate-800 shadow-2xl lg:shadow-none">
      <div class="flex flex-col h-full">
        <div class="p-6 text-white font-bold text-xl flex items-center justify-between border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-xs text-white font-black shadow-inner">RTAF</div>
            <span class="truncate tracking-tight">H135 T3H</span>
          </div>
          <button onclick="toggleSidebar()" class="lg:hidden p-1.5 hover:bg-slate-800 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        
        <nav class="flex-grow py-6 px-4 space-y-1.5 overflow-y-auto no-scrollbar text-slate-400 font-light">
          <div class="pb-2 px-4 text-[10px] uppercase tracking-widest text-slate-500 font-bold opacity-70">เอกสารทางเทคนิค</div>
          
          <button onclick="navigate('135 FLM')" id="btn-135-FLM" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm text-left">
            H135 Flight Publications
          </button>
          
          <button onclick="navigate('135 REGT')" id="btn-135-REGT" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm text-left uppercase">
            RTAF Documentation
          </button>
          
          <button onclick="navigate('Helionix Voice')" id="btn-Helionix-Voice" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm text-left">
            H135 Helionix Voice
          </button>
          
          <button onclick="navigate('135 FormRK')" id="btn-135-FormRK" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm text-left">
            H135 Record Keeping Form
          </button>
          
          <button onclick="navigate('Handbook')" id="btn-Handbook" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm text-left">
            Aviation Handbook
          </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
          <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800/50 hover:bg-red-900/80 text-white rounded-xl transition-all text-sm font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            ออกจากระบบ
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-area" class="flex-grow flex flex-col min-w-0 lg:ml-64 bg-slate-50 overflow-y-auto transition-all duration-300">
      
      <!-- Top Header -->
      <header class="bg-white/80 backdrop-blur-md shadow-sm px-4 sm:px-6 py-3 flex justify-between items-center sticky top-0 z-40 border-b border-slate-200">
        <div class="flex items-center gap-3 sm:gap-4">
          <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors z-[60]" title="สลับการแสดงผลเมนู">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <div class="flex flex-col">
            <h2 id="pageTitle" class="text-sm sm:text-md font-bold text-slate-800 leading-tight uppercase truncate max-w-[150px] sm:max-w-none">H135 Flight Publications</h2>
            <p id="pageSubtitle" class="text-[8px] sm:text-[9px] text-slate-400 font-medium uppercase tracking-widest leading-tight">Database System</p>
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="refreshData()" class="flex items-center gap-2 text-slate-400 hover:text-blue-600 transition-colors p-2 rounded-full hover:bg-blue-50" title="ดึงข้อมูลใหม่">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          </button>
        </div>
      </header>

      <!-- Content -->
      <div class="p-3 sm:p-6 space-y-4 max-w-6xl mx-auto w-full">
        
        <!-- Search Bar (Compact) -->
        <div id="searchContainer" class="bg-white p-2 rounded-xl shadow-sm border border-slate-100">
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </span>
            <input type="text" id="searchInput" oninput="performSearch()" placeholder="พิมพ์ข้อมูลที่ต้องการค้นหา..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-xs sm:text-sm">
          </div>
        </div>

        <!-- Data Table View -->
        <div id="view-data" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="overflow-x-auto no-scrollbar">
            <table class="minimal-table" id="dataTable">
              <thead>
                <tr>
                  <th class="w-10 text-center">ลำดับ</th>
                  <th class="px-4">ชื่อเอกสาร / รายละเอียด</th>
                  <th class="w-20 text-center">ปี</th>
                  <th class="w-24 sm:w-28 text-center">ขนาด</th>
                </tr>
              </thead>
              <tbody id="resultsTableBody">
              </tbody>
            </table>
          </div>
        </div>

        <!-- No Data State -->
        <div id="emptyState" class="hidden py-16 text-center">
          <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <h3 class="text-xs sm:text-sm font-medium text-slate-400 uppercase tracking-widest leading-loose">ไม่พบข้อมูลที่ท่านต้องการค้นหา</h3>
        </div>
      </div>

      <!-- Footer -->
      <footer class="mt-auto py-5 border-t border-slate-100 text-center text-slate-400 text-[8px] sm:text-[9px] bg-white tracking-[0.2em] uppercase font-light">
        &copy; 2024 H135 T3H, RTAF. All Rights Reserved. <br class="sm:hidden"> <span class="hidden sm:inline">|</span> <span class="text-blue-700 font-bold ml-1">SCHOLAR</span>
      </footer>
    </main>
  </div>

  <script>
    // ดึง URL ลิงก์ API จากสคริปต์ของคุณที่แนบมา
    const API_URL = "https://script.google.com/macros/s/AKfycbw_Uwyr9KSiUl5e9saYHxzIuYWqBz3ajXqA2-jUX6eMELopwKAnqnh0pm1nXvYOesVPfw/exec";

    let rawData = null;
    let currentPage = '135 FLM'; 
    let isSidebarCollapsed = false;
    let collapsedCats = new Set(); 
    
    const pageTitles = {
      '135 FLM': 'H135 Flight Publications',
      '135 REGT': 'RTAF Documentation',
      'Helionix Voice': 'H135 Helionix Voice',
      '135 FormRK': 'H135 Record Keeping Form',
      'Handbook': 'Aviation Handbook'
    };

    function handleLogin() {
      const p = document.getElementById('passwordInput').value;
      if (p === 'H135.SCL') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        refreshData();
      } else {
        Swal.fire({ 
          icon: 'error', 
          title: 'รหัสผ่านผิดพลาด', 
          text: 'กรุณาลองใหม่อีกครั้ง', 
          confirmButtonColor: '#1e3a8a',
          confirmButtonText: 'ตกลง',
          customClass: { popup: 'rounded-2xl', confirmButton: 'rounded-xl px-8 py-2' }
        });
      }
    }

    function logout() { location.reload(); }

    function navigate(page) {
      currentPage = page;
      document.getElementById('pageTitle').innerText = pageTitles[page];
      
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
      const activeBtn = document.getElementById('btn-' + page.replace(/\s+/g, '-'));
      if (activeBtn) activeBtn.classList.add('sidebar-active');

      document.getElementById('searchInput').value = '';
      collapsedCats.clear(); 
      performSearch();
      
      if (window.innerWidth < 1024) {
        toggleSidebar(); 
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainArea = document.getElementById('main-area');
      const overlay = document.getElementById('sidebarOverlay');
      
      if (window.innerWidth >= 1024) {
        isSidebarCollapsed = !isSidebarCollapsed;
        if (isSidebarCollapsed) {
          sidebar.classList.add('sidebar-collapsed');
          mainArea.classList.add('main-expanded');
        } else {
          sidebar.classList.remove('sidebar-collapsed');
          mainArea.classList.remove('main-expanded');
        }
      } else {
        sidebar.classList.toggle('-translate-x-full');
        sidebar.classList.toggle('translate-x-0');
        overlay.classList.toggle('hidden');
      }
    }

    function toggleCategory(catName) {
      if (collapsedCats.has(catName)) {
        collapsedCats.delete(catName);
      } else {
        collapsedCats.add(catName);
      }
      performSearch(false); 
    }

    // ฟังก์ชันเชื่อมต่อดึงข้อมูลผ่านระบบ Dual-Mode (Fetch API และ google.script.run Fallback)
    function refreshData() {
      Swal.fire({
        title: 'กำลังเชื่อมต่อฐานข้อมูล...',
        didOpen: () => Swal.showLoading(),
        allowOutsideClick: false,
        customClass: { popup: 'rounded-2xl' }
      });

      // ตรวจสอบสภาพแวดล้อม: หากรันอยู่ภายใน Google Apps Script Web App ให้ดึงข้อมูลแบบตรง
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(res => {
          Swal.close();
          if (res.error) {
            showErrorDetail('ข้อผิดพลาดจากแอปหลังบ้าน', res.error);
            return;
          }
          rawData = res;
          navigate(currentPage);
        })
        .withFailureHandler(err => {
          Swal.close();
          showApiErrorGuide(err);
        })
        .getFullData();
      } else {
        // หากเปิดผ่าน GitHub Pages หรือเซิร์ฟเวอร์ภายนอก ให้ดึงข้อมูลผ่าน API URL (Fetch API)
        fetch(API_URL)
          .then(response => {
            if (!response.ok) {
              throw new Error('HTTP Status ' + response.status + ' (การเข้าถึงถูกปฏิเสธ)');
            }
            return response.json();
          })
          .then(res => {
            Swal.close();
            if (res.error) {
              showErrorDetail('API หลังบ้านแจ้งข้อผิดพลาด', res.error);
              return;
            }
            rawData = res;
            navigate(currentPage);
          })
          .catch(err => {
            Swal.close();
            showApiErrorGuide(err);
          });
      }
    }

    // แสดงรายละเอียดของ Error ทั่วไป
    function showErrorDetail(title, errorDetail) {
      Swal.fire({
        icon: 'error',
        title: title,
        text: String(errorDetail),
        confirmButtonColor: '#1e3a8a',
        confirmButtonText: 'ตกลง',
        customClass: { popup: 'rounded-2xl' }
      });
    }

    // กล่องแจ้งเตือนพร้อมขั้นตอนสืบหาสาเหตุและแก้ไขปัญหา CORS / Deployment
    function showApiErrorGuide(err) {
      Swal.fire({
        icon: 'error',
        title: 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้',
        html: `
          <div class="text-left text-xs space-y-2.5 mt-2 p-3 bg-slate-50 rounded-xl border border-slate-200 overflow-y-auto max-h-[300px]">
            <p class="text-red-500 font-bold">สาเหตุหลักที่เป็นไปได้:</p>
            <ul class="list-decimal pl-4 space-y-1.5 text-slate-600">
              <li><b>สิทธิ์ผู้เข้าใช้งาน (CORS Blocked):</b> ตอนตั้งค่า Deploy เว็บแอปพลิเคชัน คุณต้องเลือกหัวข้อ <b>"Who has access"</b> เป็น <b>"Anyone" (ทุกคน)</b> เสมอ หากเลือก Anyone with Google account ระบบของเบราว์เซอร์จะบล็อกคำขอ (CORS)</li>
              <li><b>สคริปต์ยังไม่ได้รับอนุมัติสิทธิ์:</b> ในการ Deploy ครั้งแรก ต้องคลิกอนุมัติสิทธิ์ (Authorize Access) ให้สคริปต์สามารถอ่านเขียนข้อมูลบน Google Sheets ของคุณได้</li>
              <li><b>ใช้ลิงก์สคริปต์ผิดประเภท:</b> ตรวจสอบลิงก์ <code class="bg-red-50 text-red-600 px-1 rounded font-mono">API_URL</code> ว่าลงท้ายด้วย <code class="bg-blue-50 text-blue-600 px-1 rounded font-mono">/exec</code> หรือยัง (ลิงก์แบบทดสอบสคริปต์ที่ลงท้ายด้วย <code class="bg-red-50 text-red-600 px-1 rounded font-mono">/dev</code> จะเปิดให้ใช้งานได้เฉพาะเจ้าของบัญชีเท่านั้น และไม่รองรับการเรียกจาก GitHub)</li>
              <li><b>ข้อมูลข้อผิดพลาด:</b> <span class="font-mono text-red-600 font-semibold">${err.message || err}</span></li>
            </ul>
            <div class="mt-4 pt-3 border-t border-slate-200">
              <p class="font-bold text-slate-700">ขั้นตอนการ Deploy ใหม่เพื่อแก้ไขปัญหา:</p>
              <ol class="list-decimal pl-4 mt-1 space-y-1 text-slate-500">
                <li>เปิดสคริปต์ที่ <b>script.google.com</b></li>
                <li>ไปที่ปุ่ม <b>"การทำให้ใช้งานได้ (Deploy)"</b> &rarr; เลือก <b>"จัดการการทำให้ใช้งานได้ (Manage Deployments)"</b></li>
                <li>คลิกรูป <b>"ดินสอ (แก้ไข)"</b> ของรายการล่าสุด</li>
                <li>เลือกเวอร์ชันเป็น <b>"เวอร์ชันใหม่ (New Version)"</b></li>
                <li>เปลี่ยนหัวข้อผู้มีสิทธิ์เข้าถึงเป็น <b>"ทุกคน (Anyone)"</b></li>
                <li>กด <b>"ทำให้ใช้งานได้ (Deploy)"</b> แล้วคัดลอกลิงก์ใหม่มาอัปเดตแทนค่าเดิม</li>
              </ol>
            </div>
          </div>
        `,
        confirmButtonColor: '#1e3a8a',
        confirmButtonText: 'รับทราบ',
        customClass: {
          popup: 'rounded-2xl w-full max-w-lg'
        }
      });
    }

    function performSearch(showAlert = true) {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const sheetData = rawData.data[currentPage] || [];
      
      let filtered = sheetData.filter(item => {
        return Object.values(item).some(v => String(v).toLowerCase().includes(term));
      });

      filtered.sort((a, b) => {
        const titleA = String(a['ชื่อหนังสือ'] || a['CONTENT'] || a['Voice message'] || a['Name'] || '').toLowerCase();
        const titleB = String(b['ชื่อหนังสือ'] || b['CONTENT'] || b['Voice message'] || b['Name'] || '').toLowerCase();
        if (titleA < titleB) return -1;
        if (titleA > titleB) return 1;
        
        const yearA = parseInt(a['Year'] || a['EDITION'] || a['ปี'] || 0);
        const yearB = parseInt(b['Year'] || b['EDITION'] || b['ปี'] || 0);
        return yearA - yearB;
      });

      renderTable(filtered);
    }

    function renderTable(items) {
      const tbody = document.getElementById('resultsTableBody');
      const empty = document.getElementById('emptyState');
      const table = document.getElementById('dataTable');
      tbody.innerHTML = '';
      
      if (items.length === 0) {
        empty.classList.remove('hidden');
        table.classList.add('hidden');
        return;
      }
      empty.classList.add('hidden');
      table.classList.remove('hidden');

      const groups = {};
      items.forEach(item => {
        const cat = item['ประเภท'] || item['Type'] || 'ทั่วไป';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });

      const categoriesOrder = ['Flight Publication', 'Training Manual (System)', 'Equipment Manual'];
      
      const sortedCategories = Object.keys(groups).sort((a, b) => {
        if (currentPage === '135 FLM') {
          let idxA = categoriesOrder.indexOf(a);
          let idxB = categoriesOrder.indexOf(b);
          if (idxA === -1) idxA = 99;
          if (idxB === -1) idxB = 99;
          if (idxA !== idxB) return idxA - idxB;
        }
        return a.localeCompare(b);
      });

      let overallIndex = 1;
      sortedCategories.forEach(catName => {
        const isCollapsed = collapsedCats.has(catName);
        
        const groupHeader = document.createElement('tr');
        groupHeader.className = `category-row ${isCollapsed ? 'collapsed' : ''}`;
        groupHeader.onclick = () => toggleCategory(catName);
        groupHeader.innerHTML = `
          <td colspan="4" class="py-2.5 px-4 uppercase tracking-wider text-[10px] overflow-hidden truncate">
            <div class="flex items-center justify-between w-full">
              <span>${catName} (${groups[catName].length} รายการ)</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 chevron-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </td>
        `;
        tbody.appendChild(groupHeader);

        if (!isCollapsed) {
          groups[catName].forEach(item => {
            const title = item['ชื่อหนังสือ'] || item['CONTENT'] || item['Voice message'] || item['Name'] || 'N/A';
            const year = item['Year'] || item['EDITION'] || item['ปี'] || '-';
            const size = item['Size'] || item['ขนาด'] || item['File Size'] || item['ขนาดไฟล์'] || '-';
            const link = item['Link หนังสือ'] || item['Link'] || item['Link รวม'] || item['File sound'] || '#';
            
            let info = '';
            if (currentPage !== '135 FormRK') {
              info = item['Triggering condition'] || item['Revision'] || item['แหล่งอ้างอิง'] || item['สำหรับ'] || '';
            }
            
            const row = document.createElement('tr');
            row.innerHTML = `
              <td class="text-center text-[9px] sm:text-[10px] text-slate-400 font-mono">${overallIndex++}</td>
              <td class="max-w-[150px] sm:max-w-none">
                <a href="${link}" target="_blank" class="doc-link group">
                  <div class="font-bold text-slate-700 text-xs mb-0 doc-title group-hover:text-blue-600 transition-colors leading-tight py-1">${title}</div>
                  ${info ? `<div class="text-[8px] sm:text-[9px] text-slate-400 line-clamp-1 italic leading-tight">${info}</div>` : ''}
                </a>
              </td>
              <td class="text-center text-[10px] sm:text-xs font-medium text-slate-500 whitespace-nowrap">${year}</td>
              <td class="text-center text-[8px] sm:text-[10px] text-slate-400 uppercase font-medium">${size}</td>
            `;
            tbody.appendChild(row);
          });
        }
      });
    }

    document.getElementById('passwordInput').addEventListener('keypress', e => e.key === 'Enter' && handleLogin());
  </script>
</body>
</html>
